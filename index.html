<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utsab's IP TV</title>
<script src="script.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden; /* Pura page jeno scroll na hoy, tai overflow hidden */
height: 100vh;
display: flex;
flex-direction: column;
}

/* TOP FIXED WRAPPER */
.top-fixed-container {
position: fixed;
top: 0;
left: 0;
width: 100%;
z-index: 100;
background: #000;
}

/* HEADER */
.header{
background:#000;
padding:12px;
text-align:center;
border-top:4px solid red;
border-bottom:4px solid red;
width: 100%;
}

.header h1{
font-size:34px;
color:white;
text-shadow:0 0 15px red;
}

/* PLAYER */
.player-box{
position: relative; /* Fixed theke relative kora hoyeche jeno wrapper er bhetor thik thake */
width:100%;
background:black;
}

video{
width:100%;
height:250px;
background:black;
object-fit:contain;
}

/* CONTROLS */
.custom-controls{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:20px;
z-index:10;
transition:opacity .5s;
}

.control-btn{
width:70px;
height:70px;
border:none;
border-radius:50%;
background:red;
color:white;
font-size:28px;
cursor:pointer;
box-shadow:0 0 15px red;
}

/* SEARCH */
.search-box{
padding:14px;
background:#000;
border-bottom: 1px solid #222;
}

.search-box input{
width:100%;
padding:16px;
font-size:20px;
border-radius:16px;
border:none;
outline:none;
background:#111;
color:white;
}

/* SCROLLABLE CONTENT AREA */
.scrollable-content {
margin-top: 410px; /* Top container er height onujayi margin dewa hoyeche layout thik rakhte */
overflow-y: auto;
height: calc(100vh - 410px); /* Baki thaka ongsho scroll hobe */
padding-bottom: 20px;
}

/* CHANNEL GRID */
.channel-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
padding:14px;
}

/* CHANNEL CARD */
.channel{
background:white;
border-radius:24px;
padding:12px;
display:flex;
justify-content:center;
align-items:center;
height:120px;
cursor:pointer;
transition:.3s;
border:3px solid transparent;
animation:borderGlow 4s linear infinite;
}

.channel:hover{
transform:scale(1.05);
}

.channel img{
width:100%;
height:100%;
object-fit:contain;
padding:8px;
}

/* ACTIVE CHANNEL */
.active{
box-shadow:
0 0 20px red,
0 0 40px yellow,
0 0 60px lime;
}

/* GLOW */
@keyframes borderGlow{
0%{ border-color:#00ffff; box-shadow:0 0 10px #00ffff; }
25%{ border-color:#ff00ff; box-shadow:0 0 10px #ff00ff; }
50%{ border-color:#ffff00; box-shadow:0 0 10px #ffff00; }
75%{ border-color:#00ff00; box-shadow:0 0 10px #00ff00; }
100%{ border-color:#00ffff; box-shadow:0 0 10px #00ffff; }
}

/* FOOTER */
.footer{
text-align:center;
padding:25px;
font-size:30px;
font-weight:bold;
border-top:4px solid red;
margin-top:20px;
}

.footer span{
color:red;
}

/* MOBILE RESPONSIVE ACCORDING TO FIXED AREA */
@media(max-width:700px){
.top-fixed-container {
/* Mobile high resolution displayer jonno dorkor hole space adjust korte paren */
}

.scrollable-content {
margin-top: 410px;
height: calc(100vh - 410px);
}

.channel-grid{
grid-template-columns:repeat(3,1fr);
}

.channel{
height:95px;
padding:10px;
}

.control-btn{
width:60px;
height:60px;
font-size:24px;
}
}
</style>

<body>

<!-- FIXED TOP SECTION -->
<div class="top-fixed-container">
  <!-- HEADER -->
  <div class="header">
    <h1>Utsab IP TV</h1>
  </div>

  <!-- PLAYER -->
  <div class="player-box">
    <video id="video" autoplay controls></video>
    
    <!-- BUTTONS -->
    <div class="custom-controls">
      <button class="control-btn" onclick="prevChannel()">⏮</button>
      <button class="control-btn" onclick="togglePlay()">⏯</button>
      <button class="control-btn" onclick="nextChannel()">⏭</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-box">
    <input type="text" id="search" placeholder="Search Channel..." onkeyup="searchChannels()">
  </div>
</div>

<!-- SCROLLABLE BOTTOM SECTION -->
<div class="scrollable-content">
  <!-- CHANNELS -->
  <div class="channel-grid" id="channelGrid">
    <!-- Channels will load here dynamically -->
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 <span>Utsab IP TV</span>
  </div>
</div>

<script>
/* PLAYLIST */
const playlist = 'aynaott.m3u';

/* VARIABLES */
let channels = [];
let currentIndex = 0;

/* LOAD PLAYLIST */
fetch(playlist)
.then(response => response.text())
.then(data => {
  const lines = data.split('\n');
  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith('#EXTINF')){
      const info = lines[i];
      const url = lines[i+1];
      const name = info.split(',')[1];
      let logo = '';
      const logoMatch = info.match(/tvg-logo="(.*?)"/);
      if(logoMatch){
        logo = logoMatch[1];
      }
      channels.push({ name, url, logo });
    }
  }
  renderChannels();
  if(channels.length > 0){
    playChannel(0);
  }
});

/* RENDER */
function renderChannels(){
  const grid = document.getElementById('channelGrid');
  grid.innerHTML = '';
  channels.forEach((ch,index)=>{
    const div = document.createElement('div');
    div.className='channel';
    div.innerHTML=`<img src="${ch.logo}" alt="${ch.name}">`;
    div.onclick=()=>playChannel(index);
    grid.appendChild(div);
  });
}

/* PLAY */
function playChannel(index){
  currentIndex=index;
  const video = document.getElementById('video');
  const channel = channels[index];
  
  if(typeof Hls !== 'undefined' && Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(channel.url);
    hls.attachMedia(video);
  }
  else{
    video.src=channel.url;
  }

  document.querySelectorAll('.channel').forEach(el=>{
    el.classList.remove('active');
  });
  
  // Dynamic safety check card render hobar por add class korar jonno
  const targetCard = document.querySelectorAll('.channel')[index];
  if(targetCard) {
    targetCard.classList.add('active');
  }
}

/* NEXT */
function nextChannel(){
  currentIndex++;
  if(currentIndex >= channels.length){
    currentIndex=0;
  }
  playChannel(currentIndex);
}

/* PREV */
function prevChannel(){
  currentIndex--;
  if(currentIndex < 0){
    currentIndex=channels.length-1;
  }
  playChannel(currentIndex);
}

/* PLAY PAUSE */
function togglePlay(){
  const video = document.getElementById('video');
  if(video.paused){
    video.play();
  }
  else{
    video.pause();
  }
}

/* SEARCH */
function searchChannels(){
  const input = document.getElementById('search').value.toLowerCase();
  const cards = document.querySelectorAll('.channel');
  channels.forEach((ch,index)=>{
    if(cards[index]){
      if(ch.name.toLowerCase().includes(input)){
        cards[index].style.display='flex';
      }
      else{
        cards[index].style.display='none';
      }
    }
  });
}

/* AUTO HIDE CONTROLS */
const controls = document.querySelector('.custom-controls');
if(controls){
  setTimeout(()=>{
    controls.style.opacity='0';
  },5000);
}

/* SHOW AGAIN */
const playerBox = document.querySelector('.player-box');
if(playerBox && controls){
  playerBox.addEventListener('click',()=>{
    controls.style.opacity='1';
    setTimeout(()=>{
      controls.style.opacity='0';
    },5000);
  });
}
</script>


</body>
